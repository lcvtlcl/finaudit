<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinAudit — Статус оплаты</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{ --primary:#014ac6; --on-surface:#131b2e; --on-surface-variant:#434655; --surface:#faf8ff; --outline-variant:#c3c6d7; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--surface); color:var(--on-surface); line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh; display:flex; flex-direction:column; }
  a{ color:var(--primary); text-decoration:none; } a:hover{ text-decoration:underline; }
  svg{ display:block; }
  .head{ border-bottom:1px solid rgba(19,27,46,.06); }
  .head-inner{ max-width:820px; margin:0 auto; padding:18px 20px; display:flex; align-items:center; gap:10px; width:100%; }
  .head svg{ width:28px; height:28px; color:var(--primary); }
  .head .brand{ font-weight:700; font-size:20px; color:var(--primary); }
  main{ flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .card{ background:#fff; border:1px solid var(--outline-variant); border-radius:20px; padding:40px 36px;
    max-width:520px; width:100%; text-align:center; box-shadow:0 10px 30px -14px rgba(15,23,42,.12); }
  .icon{ width:64px; height:64px; border-radius:9999px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; }
  .icon svg{ width:34px; height:34px; }
  .ok{ background:#dcfce7; color:#16a34a; }
  .wait{ background:#fef3c7; color:#d97706; }
  .fail{ background:#fee2e2; color:#dc2626; }
  h1{ font-size:23px; font-weight:700; margin-bottom:10px; }
  p{ color:var(--on-surface-variant); margin-bottom:10px; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; font-weight:600; border-radius:12px;
    padding:13px 26px; margin-top:18px; cursor:pointer; border:1px solid transparent; }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-outline{ border-color:var(--outline-variant); color:var(--on-surface); }
  .spinner{ width:34px; height:34px; border:3px solid #fde68a; border-top-color:#d97706; border-radius:50%;
    animation:spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<header class="head">
  <div class="head-inner">
    <a href="index.html" style="display:flex;align-items:center;gap:10px">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      <span class="brand">FinAudit</span>
    </a>
  </div>
</header>

<main>
  <div class="card" id="card">
    <div class="icon wait"><div class="spinner"></div></div>
    <h1>Проверяем оплату…</h1>
    <p>Это занимает несколько секунд. Не закрывайте страницу.</p>
  </div>
</main>

<script>
  // ЮKassa возвращает пользователя сюда сразу после оплаты, а подтверждение
  // приходит к нам вебхуком чуть позже. Поэтому не объявляем успех сразу,
  // а опрашиваем свой API, пока подписка не станет активной.
  const MAX_ATTEMPTS = 10;   // ~20 секунд
  const INTERVAL_MS = 2000;
  let attempt = 0;

  const card = document.getElementById('card');

  const ICON_OK = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
  const ICON_FAIL = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>';

  function renderSuccess(expires) {
    card.innerHTML =
      '<div class="icon ok">' + ICON_OK + '</div>' +
      '<h1>Оплата прошла</h1>' +
      '<p>Подписка <b>Про</b> активна' + (expires ? ' до <b>' + expires + '</b>' : '') + '.</p>' +
      '<p>Все функции тарифа уже доступны в кабинете.</p>' +
      '<a class="btn btn-primary" href="dashboard.html">Перейти в кабинет</a>';
  }

  function renderPending() {
    card.innerHTML =
      '<div class="icon wait">' +
        '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 7h2v6h-2zm0 8h2v2h-2zm1-13C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>' +
      '</div>' +
      '<h1>Платёж обрабатывается</h1>' +
      '<p>Банк ещё не подтвердил оплату. Обычно это занимает до нескольких минут — подписка включится автоматически, повторно платить не нужно.</p>' +
      '<a class="btn btn-outline" href="payment.html">Проверить ещё раз</a> ' +
      '<a class="btn btn-primary" href="dashboard.html">В кабинет</a>';
  }

  function renderFail(msg) {
    card.innerHTML =
      '<div class="icon fail">' + ICON_FAIL + '</div>' +
      '<h1>Оплата не прошла</h1>' +
      '<p>' + (msg || 'Платёж не был завершён. Деньги не списаны.') + '</p>' +
      '<a class="btn btn-outline" href="index.html#pricing">К тарифам</a> ' +
      '<a class="btn btn-primary" href="dashboard.html">В кабинет</a>';
  }

  async function check() {
    attempt++;
    try {
      const res = await fetch('/api/billing/subscription');
      if (res.status === 401) { location.href = 'login.html'; return; }
      if (!res.ok) { renderFail('Не удалось проверить статус платежа.'); return; }

      const data = await res.json();
      if (data.active) { renderSuccess(data.expires_at); return; }

      if (attempt >= MAX_ATTEMPTS) { renderPending(); return; }
      setTimeout(check, INTERVAL_MS);
    } catch (e) {
      if (attempt >= MAX_ATTEMPTS) { renderFail('Сеть недоступна. Проверьте статус позже в кабинете.'); return; }
      setTimeout(check, INTERVAL_MS);
    }
  }

  check();
</script>
</body>
</html>
