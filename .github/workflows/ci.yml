name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Verify dependencies
        run: go mod verify

      - name: Run Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Run Tests
        run: go test -v -race ./...
        